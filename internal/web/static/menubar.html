                                        </div>
                                    `;
                                }).join("")}
                            </div>
                        </div>
                    </section>
                `;
                document.getElementById("settings-save").disabled = state.saving;
                settingsBody.querySelectorAll("button[data-provider-move]").forEach((button) => {
                    button.addEventListener("click", () => {
                        const providerID = button.getAttribute("data-provider-id") || "";
                        const direction = button.getAttribute("data-provider-move") || "";
                        if (!providerID || !direction) {
                            return;
                        }
                        moveDraftProvider(providerID, direction);
                    });
                });
            }

            function renderStandardView(providers) {
                return `
                    <section class="provider-grid provider-grid-standard">
                        ${providers.map((provider) => renderStandardCard(provider)).join("")}
                    </section>
                `;
            }

            function renderMinimalView(providers) {
                return `
                    <section class="minimal-view">
                        ${providers.map((provider) => `
                            <article class="minimal-provider-row status-${escapeHTML(provider.status || "healthy")}">
                                ${providerHeaderMarkup(provider)}
                                <div class="minimal-quota-list">
                                    ${providerQuotas(provider).map((quota, index) => `
                                        ${index > 0 ? '<span class="inline-divider" aria-hidden="true">|</span>' : ""}
                                        <span class="minimal-quota-inline">
                                            <span class="minimal-quota-label">${escapeHTML(compactQuotaLabel(quota.label, quota.key))}</span>
                                            ${sourceTagMarkup(quota)}
                                            <span class="minimal-quota-percent">${Math.round(clampPercent(quota.percent))}%</span>
                                            <span class="minimal-quota-reset">${escapeHTML(compactResetLabel(quota))}</span>
                                        </span>
                                    `).join("")}
                                </div>
                            </article>
                        `).join("")}
                    </section>
                `;
            }

            function renderDetailedView(providers) {
                return `
                    <section class="provider-grid provider-grid-detailed">
                        ${providers.map((provider) => renderDetailedCard(provider)).join("")}
                    </section>
                `;
            }

            function renderStandardCard(provider) {
                const quotas = providerQuotas(provider);
                return `
                    <article class="provider-card provider-card-standard status-${escapeHTML(provider.status || "healthy")}" style="--card-span:${cardSpan(provider)};">
                        ${providerHeaderMarkup(provider)}
                        <div class="quota-grid" style="--quota-count:${Math.max(quotas.length, 1)};">
                            ${quotas.map((quota) => renderStandardQuota(quota)).join("")}
                        </div>
                    </article>
                `;
            }

            function renderDetailedCard(provider) {
                return `
                    <article class="provider-card provider-card-detailed status-${escapeHTML(provider.status || "healthy")}">
                        ${providerHeaderMarkup(provider)}
                        <div class="quota-detail-stack">
                            ${providerQuotas(provider).map((quota) => renderDetailedQuota(quota)).join("")}
                        </div>
                    </article>
                `;
            }

            function sourceTagMarkup(quota) {
                if (!quota.source || quota.source !== 'api') return '';
                const age = quota.age_seconds || 0;
                let ageText = '';
                if (age > 0 && age < 3600) ageText = Math.floor(age / 60) + 'm ago';
                else if (age >= 3600) ageText = Math.floor(age / 3600) + 'h ago';
                return `<span class="quota-source-tag">API${ageText ? `<span class="source-age">${escapeHTML(ageText)}</span>` : ''}</span>`;
            }

            function renderStandardQuota(quota) {
                const usage = usageSummary(quota);
                return `
                    <div class="quota-item status-${escapeHTML(quota.status || "healthy")}">
                        ${pieChartMarkup(quota)}
                        <span class="quota-label">${escapeHTML(compactQuotaLabel(quota.label, quota.key))}</span>
                        <span class="quota-reset-line">${icons.clock}<span>${escapeHTML(compactResetLabel(quota))}</span></span>
                        ${usage ? `<span class="quota-usage-line">${escapeHTML(usage)} used</span>` : ''}
                        ${sourceTagMarkup(quota)}
                    </div>
                `;
            }


            function renderDetailedQuota(quota) {
                const percent = clampPercent(quota.percent);
                const meta = detailedMeta(quota);
                return `
                    <section class="quota-detail-section status-${escapeHTML(quota.status || "healthy")}">
                        <div class="quota-detail-head">
                            <span class="quota-detail-label">${escapeHTML(quota.label || compactQuotaLabel(quota.label, quota.key))} ${sourceTagMarkup(quota)}</span>
                            <span class="quota-reset-line">${icons.clock}<span>${escapeHTML(compactResetLabel(quota))}</span></span>
                        </div>

                        <div class="quota-bar-row">
                            <div class="quota-bar-track">
                                <span class="quota-bar-fill status-${escapeHTML(quota.status || "healthy")}" style="width:${percent.toFixed(2)}%;"></span>
                            </div>
                            <span class="quota-bar-value">${Math.round(percent)}%</span>
                        </div>
                        <div class="quota-detail-meta">
                            ${meta.map((item, index) => `
                                ${index > 0 ? '<span class="detail-divider" aria-hidden="true"></span>' : ""}
                                <span>${escapeHTML(item)}</span>
                            `).join("")}
                        </div>
                    </section>
                `;
            }

            function providerHeaderMarkup(provider) {
                return `
                    <div class="provider-header">
                        <div class="provider-copy">
                            <span class="provider-icon ${escapeHTML(providerIconClass(provider))}" aria-hidden="true"></span>
                            <span class="provider-name">${escapeHTML(provider.label)}</span>
                            ${provider.promo ? `<a class="promo-tag ${isPromoOffPeak(provider.promo) ? 'promo-offpeak' : 'promo-peak'}" href="https://www.reddit.com/r/ClaudeAI/comments/1s4idaq/update_on_session_limits/" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">${escapeHTML(promoLabel(provider.promo))}</a>` : ''}
                        </div>
                        <span class="provider-updated">${escapeHTML(compactUpdatedLabel(provider.updated_at))}</span>
                    </div>
                `;
            }

            function pieChartMarkup(quota) {
                const percent = clampPercent(quota.percent);
                const circumference = 97.389;
                const dash = (percent / 100) * circumference;
                return `
                    <svg class="quota-meter" viewBox="0 0 40 40" width="40" height="40" aria-hidden="true">
                        <circle class="quota-track" cx="20" cy="20" r="15.5"></circle>
                        <circle class="quota-fill" cx="20" cy="20" r="15.5" stroke-dasharray="${dash.toFixed(2)} ${circumference.toFixed(2)}"></circle>
                        <circle class="quota-center" cx="20" cy="20" r="10.5"></circle>

            }

            function renderStateCard(title, bodyCopy) {
                return `
                    <article class="state-card">
                        <strong>${escapeHTML(title)}</strong>
                        <span>${escapeHTML(bodyCopy)}</span>
                    </article>
                `;
            }

            function activePreferences() {
                return state.settingsOpen && state.draft ? state.draft : state.preferences;
            }

            function visibleProviders() {
                const snapshotProviders = Array.isArray(state.snapshot && state.snapshot.providers) ? state.snapshot.providers.slice() : [];
                const ordered = sortByProviderOrder(snapshotProviders, activePreferences().providers_order);
                const visible = activePreferences().visible_providers || [];
                if (visible.length === 0) {
                    return ordered;
                }
                const allowed = new Set(visible);
                return ordered.filter((provider) => allowed.has(provider.id));
            }

            function orderedProviderOptions() {
                return sortByProviderOrder(state.providerOptions.slice(), activePreferences().providers_order);
            }

            function providerQuotas(provider) {
                return Array.isArray(provider && provider.quotas) ? provider.quotas : [];
            }

            function cardSpan(provider) {
                const count = providerQuotas(provider).length;
                if (count >= 3) {
                    return 6;
                }
                if (count === 2) {
                    return 4;
                }
                return 2;
            }

            function buildAggregate(providers) {
                return providers.reduce((aggregate, provider) => {
                    const highest = clampPercent(provider.highest_percent);
                    aggregate.highest_percent = Math.max(aggregate.highest_percent, highest);
                    if (provider.status === "critical") {
                        aggregate.critical_count += 1;
                    } else if (provider.status === "warning" || provider.status === "danger") {
                        aggregate.warning_count += 1;
                    }
                    return aggregate;
                }, { highest_percent: 0, warning_count: 0, critical_count: 0 });
            }

            function normalizePreferences(raw) {
                const storedStatus = normalizeStatusDisplay(raw && raw.status_display);
                const storedTheme = readStoredThemeMode();
                const rawTheme = raw && typeof raw.theme === "string" ? normalizeTheme(raw.theme) : "";
                return {
                    enabled: raw && raw.enabled !== false,
                    default_view: normalizeView(raw && raw.default_view),
                    refresh_seconds: Math.max(parseInt(raw && raw.refresh_seconds, 10) || 60, 10),
                    providers_order: normalizeStringList(raw && raw.providers_order),
                    visible_providers: normalizeStringList(raw && raw.visible_providers),
                    warning_percent: parseInt(raw && raw.warning_percent, 10) || 70,
                    critical_percent: parseInt(raw && raw.critical_percent, 10) || 90,
                    status_display: storedStatus.mode ? storedStatus : { mode: "multi_provider", selected_quotas: [] },
                    theme: normalizeTheme(rawTheme || storedTheme || "system")
                };
            }

            function normalizeStatusDisplay(raw) {
                const mode = raw && typeof raw.mode === "string" ? raw.mode : "";
                const providerID = raw && typeof raw.provider_id === "string" ? raw.provider_id : "";
                const quotaKey = raw && typeof raw.quota_key === "string" ? raw.quota_key : "";
                const selectedQuotas = normalizeStatusSelections(raw && raw.selected_quotas, providerID, quotaKey);
                const normalizedMode = mode === "provider_specific" ? "multi_provider" : mode;
                if (!statusDisplayOptions.some((option) => option.mode === normalizedMode)) {
                    return { mode: "multi_provider", selected_quotas: selectedQuotas };
                }
                return { mode: normalizedMode, selected_quotas: normalizedMode === "multi_provider" ? selectedQuotas : [] };
            }

            function normalizeStatusSelections(values, legacyProviderID = "", legacyQuotaKey = "") {
                const rawValues = Array.isArray(values) ? values : [];
                const seen = new Set();
                const selections = [];
                for (const value of rawValues) {
                    const providerID = String(value && value.provider_id ? value.provider_id : "").trim();
                    const quotaKey = String(value && value.quota_key ? value.quota_key : "").trim();
                    if (!providerID) {
                        continue;
                    }
                    const key = `${providerID}::${quotaKey}`;
                    if (seen.has(key)) {
                        continue;
                    }
                    seen.add(key);
                    selections.push({ provider_id: providerID, quota_key: quotaKey });
                    if (selections.length === 3) {
                        return selections;
                    }
                }
                if (selections.length === 0 && legacyProviderID) {
                    return [{ provider_id: String(legacyProviderID).trim(), quota_key: String(legacyQuotaKey || "").trim() }];
                }
                return selections;
            }

            function normalizeStringList(values) {
                if (!Array.isArray(values)) {
                    return [];
                }
                const seen = new Set();
                return values
                    .map((value) => String(value || "").trim())
                    .filter((value) => value && !seen.has(value) && seen.add(value));
            }

            function mergeProviderOrder(order, availableIDs) {
                const wanted = normalizeStringList(order);
                const available = normalizeStringList(availableIDs);
                const seen = new Set();
                const merged = [];
                for (const id of wanted) {
                    if (available.includes(id) && !seen.has(id)) {
                        seen.add(id);
                        merged.push(id);
                    }
                }
                for (const id of available) {
                    if (!seen.has(id)) {
                        seen.add(id);
                        merged.push(id);
                    }
                }
                return merged;
            }

            function sortByProviderOrder(items, order) {
                const available = items.map((item) => item.id);
                const mergedOrder = mergeProviderOrder(order, available);
                const indexByID = new Map(mergedOrder.map((id, index) => [id, index]));
                return items.sort((left, right) => {
                    const leftOrder = indexByID.has(left.id) ? indexByID.get(left.id) : Number.MAX_SAFE_INTEGER;
                    const rightOrder = indexByID.has(right.id) ? indexByID.get(right.id) : Number.MAX_SAFE_INTEGER;
                    if (leftOrder !== rightOrder) {
                        return leftOrder - rightOrder;
                    }
                    return String(left.label || "").localeCompare(String(right.label || ""));
                });
            }

            function readStoredStatusDisplay() {
                try {
                    const raw = localStorage.getItem(STATUS_STORAGE_KEY);
                    return raw ? normalizeStatusDisplay(JSON.parse(raw)) : null;
                } catch (error) {
                    return null;
                }
            }

            function writeStoredStatusDisplay(statusDisplay) {
                try {
                    localStorage.setItem(STATUS_STORAGE_KEY, JSON.stringify(normalizeStatusDisplay(statusDisplay)));
                } catch (error) {
                    // Ignore local storage errors inside the popover.
                }
            }

            function readStoredViewMode() {
                try {

                    return raw ? normalizeView(raw) : "";

            function writeStoredViewMode(view) {

            function readStoredProviderOrder() {
                try {
                    const raw = localStorage.getItem(ORDER_STORAGE_KEY);
                    if (!raw) {
                        return [];
                    }
                    return normalizeStringList(JSON.parse(raw));
                } catch (error) {
                    return [];
                }
            }

            function writeStoredProviderOrder(order) {
                try {
                    localStorage.setItem(ORDER_STORAGE_KEY, JSON.stringify(normalizeStringList(order)));
                } catch (error) {
                    // Ignore local storage errors inside the popover.
                }
            }

            function readStoredThemeMode() {
                try {
                    const raw = localStorage.getItem(THEME_STORAGE_KEY);
                    return raw ? normalizeTheme(raw) : "";
                } catch (error) {
                    return "";
                }
            }

            function writeStoredThemeMode(mode) {
                try {
                    localStorage.setItem(THEME_STORAGE_KEY, normalizeTheme(mode));
                } catch (error) {

                }

            function resolveThemeMode() {
                const draft = state.settingsOpen && state.draft ? state.draft : state.preferences;
                return normalizeTheme(draft && draft.theme);
            }

            function applyTheme() {
                const mode = resolveThemeMode();
                const root = document.documentElement;
                const effective = mode === "system" ? (state.systemPrefersDark ? "dark" : "light") : mode;
                root.setAttribute("data-theme", effective);
                root.style.colorScheme = effective;
            }

            function queueResizeReport() {
                if (resizeFrame) {
                    window.cancelAnimationFrame(resizeFrame);
                }
                if (resizeTimer) {
                    window.clearTimeout(resizeTimer);
                    resizeTimer = 0;
                }
                resizeFrame = window.requestAnimationFrame(() => {
                    resizeFrame = 0;
                    reportPreferredHeight();
                    resizeTimer = window.setTimeout(() => {
                        resizeTimer = 0;
                        reportPreferredHeight();
                    }, 48);
                });
            }

            function measuredGapY(element) {
                if (!(element instanceof HTMLElement)) {
                    return 0;
                }
                const styles = window.getComputedStyle(element);
                const gap = parseFloat(styles.rowGap || styles.gap || "0");
                return Number.isFinite(gap) ? gap : 0;
            }

            function measuredPaddingY(element) {
                if (!(element instanceof HTMLElement)) {
                    return 0;
                }
                const styles = window.getComputedStyle(element);
                const top = parseFloat(styles.paddingTop || "0");
                const bottom = parseFloat(styles.paddingBottom || "0");
                return (Number.isFinite(top) ? top : 0) + (Number.isFinite(bottom) ? bottom : 0);
            }

            function measuredScrollableHeight(element) {
                if (!(element instanceof HTMLElement)) {
                    return 0;
                }
                const clientHeight = Math.ceil(element.clientHeight || 0);
                const scrollHeight = Math.ceil(element.scrollHeight || 0);
                const offsetHeight = Math.ceil(element.offsetHeight || 0);
                let contentHeight = 0;
                for (const child of element.children) {
                    if (child instanceof HTMLElement) {
                        contentHeight = Math.max(contentHeight, Math.ceil(child.offsetTop + child.offsetHeight));
                    }
                }
                contentHeight += measuredPaddingY(element);
                if (scrollHeight > clientHeight + 1) {
                    return Math.max(scrollHeight, contentHeight);
                }
                return Math.max(contentHeight, offsetHeight && scrollHeight === 0 ? offsetHeight : 0);
            }

            function preferredResizeFloor() {
                if (state.settingsOpen) {
                    return 320;
                }
                if (state.view === "detailed") {
                    return 500;
                }
                if (state.view === "minimal") {
                    return 140;
                }
                return 320;
            }

            function measuredContentHeight() {
                if (state.settingsOpen) {
                    return (settingsHeader instanceof HTMLElement ? settingsHeader.offsetHeight : 0)
                        + measuredScrollableHeight(settingsBody)
                        + (settingsFooter instanceof HTMLElement ? settingsFooter.offsetHeight : 0);
                }
                return (header instanceof HTMLElement ? header.offsetHeight : 0)
                    + measuredScrollableHeight(body)
                    + (footer instanceof HTMLElement ? footer.offsetHeight : 0)
                    + measuredPaddingY(shell)
                    + (measuredGapY(shell) * 2);
            }

            function reportPreferredHeight() {
                const measured = Math.ceil(measuredContentHeight());
                const height = Math.max(preferredResizeFloor(), Math.min(720, measured));
                const payload = { type: "resize", height };
                window.postMessage(payload, "*");
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage(payload, "*");
                }
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.onwatchResize) {
                    window.webkit.messageHandlers.onwatchResize.postMessage({ height });
                }
            }

            function ensureMultiProviderSelection() {
                if (!state.draft || state.draft.status_display.mode !== "multi_provider") {
                    return;
                }
                const options = selectableStatusQuotaOptions();
                const validKeys = new Set(options.map((option) => statusSelectionKey(option)));
                let selections = normalizeStatusSelections(state.draft.status_display.selected_quotas)
                    .filter((selection) => validKeys.has(statusSelectionKey(selection)));
                if (selections.length === 0) {
                    selections = options.slice(0, 3).map((option) => ({
                        provider_id: option.provider_id,
                        quota_key: option.quota_key
                    }));
                }
                state.draft.status_display.selected_quotas = selections.slice(0, 3);
            }

            function providerOptionByID(id) {
                return state.providerOptions.find((provider) => provider.id === id) || null;

            function selectableStatusQuotaOptions() {
                const draft = state.draft || state.preferences;
                const visible = normalizeStringList(draft.visible_providers);
                const showAll = visible.length === 0;
                return orderedProviderOptions()
                    .filter((provider) => showAll || visible.includes(provider.id))
                    .flatMap((provider) => (Array.isArray(provider.quotas) ? provider.quotas : []).map((quota) => ({
                        provider_id: provider.id,
                        provider_label: provider.label,
                        quota_key: quota.key,
                        quota_label: quota.label,
                        base_provider: provider.base_provider

            function statusSelectionKey(selection) {
                const providerID = String(selection && selection.provider_id ? selection.provider_id : "").trim();

                return `${providerID}::${quotaKey}`;

                const parts = String(value || "").split("::");

            function statusDisplayPreview(snapshot, preferences) {
                const display = preferences && preferences.status_display ? preferences.status_display : { mode: "multi_provider", selected_quotas: [] };
                if (display.mode === "critical_count") {
                    return `✦ ${aggregateAlertCount(snapshot)} ⚠`;
                }
                if (display.mode === "icon_only") {
                    return "✦";
                }
                const parts = multiProviderPreviewParts(snapshot, display);
                return parts.length > 0 ? `✦ ${parts.join("·")}` : "✦ Select up to 3 quotas";
            }

            function multiProviderPreviewParts(snapshot, display) {
                if (!snapshot || !Array.isArray(snapshot.providers)) {
                    return [];

                return normalizeStatusSelections(display && display.selected_quotas)
                    .map((selection) => {
                        const provider = snapshot.providers.find((item) => item.id === selection.provider_id) || null;
                        if (!provider) {
                            return "";
                        }
                        const quota = Array.isArray(provider.quotas)
                            ? provider.quotas.find((item) => item.key === selection.quota_key)
                            : null;
                        const percent = quota ? quota.percent : provider.highest_percent;
                        return `${Math.round(clampPercent(percent))}%`;
                    })
                    .filter(Boolean);

            function providerIconClass(provider) {
                const base = String(provider && (provider.base_provider || provider.baseProvider || provider.id) || "").split(":")[0];

            function aggregateAlertCount(snapshot) {
                if (!snapshot || !snapshot.aggregate) {

            function detailedMeta(quota) {
                const meta = [];
                if (Number.isFinite(Number(quota.current_rate)) && Number(quota.current_rate) > 0) {
                    meta.push(`Rate: ${formatRate(quota.current_rate)}/hr`);
                }
                if (Number.isFinite(Number(quota.projected_value)) && Number(quota.projected_value) > 0) {
                    meta.push(`Projected: ${Math.round(clampPercent(quota.projected_value))}%`);
                }
                const usage = usageSummary(quota);
                if (usage) {
                    meta.push(usage);
                }
                const absoluteReset = formatAbsoluteReset(quota.reset_at);
                if (absoluteReset !== "--") {
                    meta.push(absoluteReset);
                }
                if (meta.length === 0) {
                    meta.push(`Reset: ${compactResetLabel(quota)}`);
                }
                return meta;
            }

            function usageSummary(quota) {
                const limit = Number(quota.limit);
                const used = Number(quota.used);
                if (Number.isFinite(limit) && limit > 0 && Number.isFinite(used) && used >= 0) {
                    return `${Math.round(used)}/${Math.round(limit)}`;
                }
                return "";
            }

            function formatRate(value) {
                const numeric = Number(value);
                if (!Number.isFinite(numeric) || numeric <= 0) {
                    return "0";
                }
                const digits = numeric < 10 ? 2 : numeric < 100 ? 1 : 0;
                return new Intl.NumberFormat("en-US", {
                    minimumFractionDigits: digits,
                    maximumFractionDigits: digits
                }).format(numeric);
            }

            function formatAbsoluteReset(value) {
                const text = String(value || "").trim();
                if (!text) {
                    return "--";
                }
                const date = new Date(text);
                if (Number.isNaN(date.getTime())) {
                    return text;
                }
                return new Intl.DateTimeFormat("en-US", {
                    month: "short",
                    day: "numeric",
                    hour: "numeric",
                    minute: "2-digit"
                }).format(date);
            }

            function compactUpdatedLabel(value) {

            function compactTimeLabel(value) {

                    .replace(/\s+minutes?$/i, "m")
                    .replace(/\s+hours?$/i, "h")
                    .replace(/\s+days?$/i, "d")
                    .replace(/\s+day$/i, "d")
                    .replace(/\s+hour$/i, "h")
                    .replace(/\s+minute$/i, "m");
                if (normalized.toLowerCase() === "just now" || normalized === "0m") {

            // Promo countdown: update tags every 30s without API calls
            let _menubarPromos = [];

            function storeMenubarPromos(providers) {

                if (_promoCountdownTimer) clearInterval(_promoCountdownTimer);

                    if (!promo) return;
                    const offpeak = isPromoOffPeak(promo);

            function isPromoOffPeak(promo) {
                const now = new Date();
                const etStr = now.toLocaleString("en-US", { timeZone: "America/New_York" });
                const et = new Date(etStr);
                const hour = et.getHours();
                const day = et.getDay();
                const isWeekday = day >= 1 && day <= 5;
                const isPeak = promo.peak_weekdays_only ? (isWeekday && hour >= promo.peak_start_hour_et && hour < promo.peak_end_hour_et) : false;
                return !isPeak;
            }

            function promoMinutesUntilTransition(promo) {
                const now = new Date();
                const etStr = now.toLocaleString("en-US", { timeZone: "America/New_York" });
                const et = new Date(etStr);
                const hour = et.getHours();
                const min = et.getMinutes();
                const day = et.getDay();
                const isWeekday = day >= 1 && day <= 5;
                const isPeak = promo.peak_weekdays_only ? (isWeekday && hour >= promo.peak_start_hour_et && hour < promo.peak_end_hour_et) : false;
                let totalMin;
                if (isPeak) {
                    totalMin = (promo.peak_end_hour_et - hour - 1) * 60 + (60 - min);
                } else if (isWeekday && hour < promo.peak_start_hour_et) {
                    totalMin = (promo.peak_start_hour_et - hour - 1) * 60 + (60 - min);
                } else {
                    let daysToAdd;
                    if (day === 5) daysToAdd = 3;
                    else if (day === 6) daysToAdd = 2;
                    else if (day === 0) daysToAdd = 1;
                    else daysToAdd = 1;
                    totalMin = (daysToAdd - 1) * 1440 + (24 - hour - 1) * 60 + (60 - min) + promo.peak_start_hour_et * 60;
                }
                if (promo.ends_at) {
                    const promoEndMin = Math.floor((new Date(promo.ends_at) - now) / 60000);
                    if (promoEndMin > 0 && promoEndMin < totalMin) totalMin = promoEndMin;
                }
                return Math.max(0, totalMin);
            }

            function formatPromoCountdown(minutes) {
                if (minutes <= 0) return "";
                if (minutes >= 1440) {
                    const d = Math.floor(minutes / 1440);
                    const h = Math.floor((minutes % 1440) / 60);
                    return h > 0 ? d + "d " + h + "h" : d + "d";
                }
                if (minutes >= 60) {
                    const h = Math.floor(minutes / 60);
                    const m = minutes % 60;
                    return m > 0 ? h + "h " + m + "m" : h + "h";
                }
                return minutes + "m";
            }

            function promoLabel(promo) {
                const label = isPromoOffPeak(promo) ? "Off-peak" : "Peak hours";
                const countdown = formatPromoCountdown(promoMinutesUntilTransition(promo));
                return countdown ? label + " till " + countdown : label;
            }

            function escapeHTML(value) {
                return String(value == null ? "" : value)
                    .replaceAll("&", "&amp;")
                    .replaceAll("<", "&lt;")
                    .replaceAll(">", "&gt;")
                    .replaceAll("\"", "&quot;")
                    .replaceAll("'", "&#39;");
            }
        })();
    </script>
